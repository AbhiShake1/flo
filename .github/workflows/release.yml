name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        run: ./scripts/run_tests.sh

      - name: Build notarized artifacts
        env:
          FLO_RELEASE_VERSION: ${{ github.ref_name }}
          FLO_BUILD_NUMBER: ${{ github.run_number }}
          FLO_OUTPUT_DIR: ${{ github.workspace }}/.artifacts/release
          FLO_BUILD_DMG: "true"
          FLO_APPLE_TEAM_ID: ${{ secrets.FLO_APPLE_TEAM_ID }}
          FLO_APPLE_ID: ${{ secrets.FLO_APPLE_ID }}
          FLO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.FLO_APPLE_APP_SPECIFIC_PASSWORD }}
          FLO_DEVELOPER_IDENTITY: ${{ secrets.FLO_DEVELOPER_IDENTITY }}
        run: |
          set -euo pipefail

          VERSION="${FLO_RELEASE_VERSION#v}"
          export FLO_RELEASE_VERSION="$VERSION"
          ./scripts/notarize_release.sh

      - name: Validate artifact naming
        env:
          FLO_RELEASE_VERSION: ${{ github.ref_name }}
          FLO_OUTPUT_DIR: ${{ github.workspace }}/.artifacts/release
        run: |
          set -euo pipefail

          VERSION="${FLO_RELEASE_VERSION#v}"
          DMG="FloApp-${VERSION}-arm64.dmg"
          SHA_FILE="${DMG}.sha256"

          test -f "$FLO_OUTPUT_DIR/$DMG"
          test -f "$FLO_OUTPUT_DIR/$SHA_FILE"

          grep -q "$DMG" "$FLO_OUTPUT_DIR/$SHA_FILE"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .artifacts/release/*
