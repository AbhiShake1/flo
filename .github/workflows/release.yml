name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: release
    runs-on: macos-15
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      dmg_sha256: ${{ steps.release_meta.outputs.dmg_sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run tests
        run: ./scripts/run_tests.sh

      - name: Build release artifacts
        env:
          FLO_RELEASE_VERSION: ${{ github.ref_name }}
          FLO_BUILD_NUMBER: ${{ github.run_number }}
          FLO_OUTPUT_DIR: ${{ github.workspace }}/.artifacts/release
          FLO_BUILD_DMG: "true"
          FLO_NOTARIZE: "false"
        run: |
          set -euo pipefail

          VERSION="${FLO_RELEASE_VERSION#v}"
          export FLO_RELEASE_VERSION="$VERSION"
          ./scripts/notarize_release.sh

      - name: Validate artifact naming and capture metadata
        id: release_meta
        env:
          FLO_RELEASE_VERSION: ${{ github.ref_name }}
          FLO_OUTPUT_DIR: ${{ github.workspace }}/.artifacts/release
        run: |
          set -euo pipefail

          VERSION="${FLO_RELEASE_VERSION#v}"
          DMG="FloApp-${VERSION}-arm64.dmg"
          SHA_FILE="${DMG}.sha256"

          test -f "$FLO_OUTPUT_DIR/$DMG"
          test -f "$FLO_OUTPUT_DIR/$SHA_FILE"

          grep -q "$DMG" "$FLO_OUTPUT_DIR/$SHA_FILE"

          DMG_SHA="$(awk '{ print $1 }' "$FLO_OUTPUT_DIR/$SHA_FILE")"
          [[ "$DMG_SHA" =~ ^[0-9a-f]{64}$ ]]

          {
            echo "version=$VERSION"
            echo "dmg_sha256=$DMG_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .artifacts/release/*

  update-homebrew-cask:
    name: update-homebrew-cask
    needs: release
    runs-on: macos-15
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Update cask version and checksum
        run: |
          set -euo pipefail
          ./scripts/update_cask.sh "${{ needs.release.outputs.version }}" "${{ needs.release.outputs.dmg_sha256 }}"

      - name: Validate updated cask
        run: |
          set -euo pipefail

          TAP_NAME="local/flo-ci"
          trap 'HOMEBREW_NO_AUTO_UPDATE=1 brew untap "$TAP_NAME" >/dev/null 2>&1 || true' EXIT

          HOMEBREW_NO_AUTO_UPDATE=1 brew untap "$TAP_NAME" >/dev/null 2>&1 || true
          HOMEBREW_NO_AUTO_UPDATE=1 brew tap-new "$TAP_NAME" >/dev/null

          TAP_DIR="$(brew --repository "$TAP_NAME")"
          mkdir -p "$TAP_DIR/Casks"
          cp Casks/flo.rb "$TAP_DIR/Casks/flo.rb"

          HOMEBREW_NO_AUTO_UPDATE=1 brew audit --cask --strict --tap "$TAP_NAME" flo

      - name: Create cask bump pull request
        id: create_cask_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v8
        with:
          branch: "chore/homebrew-cask-v${{ needs.release.outputs.version }}"
          delete-branch: true
          title: "chore(cask): bump flo to v${{ needs.release.outputs.version }}"
          commit-message: "chore(cask): bump flo to v${{ needs.release.outputs.version }}"
          body: |
            ## Summary
            - bump `Casks/flo.rb` to `v${{ needs.release.outputs.version }}`
            - update SHA256 to match `FloApp-${{ needs.release.outputs.version }}-arm64.dmg`

            Generated automatically by `.github/workflows/release.yml`.
          labels: |
            release
            homebrew

      - name: Note manual PR fallback
        if: ${{ steps.create_cask_pr.outcome != 'success' }}
        run: |
          echo "Automated PR creation is disabled for GITHUB_TOKEN in this repository."
          echo "A cask bump branch was pushed; create the PR manually if needed."
