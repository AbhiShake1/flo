name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  dco-check:
    name: dco-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate DCO sign-off
        run: |
          set -euo pipefail

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            base="$(jq -r '.pull_request.base.sha' "$GITHUB_EVENT_PATH")"
            head="$(jq -r '.pull_request.head.sha' "$GITHUB_EVENT_PATH")"
          else
            base="$(jq -r '.before' "$GITHUB_EVENT_PATH")"
            head="$(jq -r '.after // .head_commit.id' "$GITHUB_EVENT_PATH")"
          fi

          if [[ "$base" =~ ^0+$ ]]; then
            base=""
          fi

          if [[ -n "$base" ]]; then
            commits=$(git rev-list "$base..$head")
          else
            commits="$head"
          fi

          if [[ -z "$commits" ]]; then
            echo "No commits to validate."
            exit 0
          fi

          missing=0
          while IFS= read -r commit; do
            [[ -z "$commit" ]] && continue
            if ! git log --format=%B -n 1 "$commit" | grep -qi '^Signed-off-by:'; then
              echo "Missing Signed-off-by trailer in commit: $commit"
              missing=1
            fi
          done <<< "$commits"

          if [[ "$missing" -ne 0 ]]; then
            echo "DCO check failed. Recreate commits with: git commit --amend -s"
            exit 1
          fi

  build-test:
    name: build-test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift Build
        run: swift build

      - name: Swift Tests
        run: ./scripts/run_tests.sh

  script-lint:
    name: script-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: shellcheck scripts/*.sh
