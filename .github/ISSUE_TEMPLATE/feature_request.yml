name: Feature request
description: Propose an improvement to flo
title: "[feature]: "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Explain the problem and desired outcome.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation are you facing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Be specific about behavior and UX.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: additional
    attributes:
      label: Additional context
